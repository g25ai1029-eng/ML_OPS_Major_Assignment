<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olivetti Face Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 0.4rem; }
    p.subtitle { color: #718096; font-size: 0.9rem; margin-bottom: 1.8rem; }
    label.upload-area {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.5rem;
      border: 2px dashed #cbd5e0; border-radius: 8px;
      padding: 2rem; cursor: pointer; transition: border-color 0.2s;
    }
    label.upload-area:hover { border-color: #4299e1; }
    label.upload-area input { display: none; }
    label.upload-area span { color: #4299e1; font-weight: 600; }
    label.upload-area small { color: #a0aec0; font-size: 0.8rem; }
    #preview {
      margin-top: 1rem; text-align: center; display: none;
    }
    #preview img {
      max-width: 200px; max-height: 200px;
      border-radius: 8px; border: 2px solid #e2e8f0;
    }
    button {
      margin-top: 1.5rem; width: 100%; padding: 0.75rem;
      background: #4299e1; color: #fff; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3182ce; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    #result {
      margin-top: 1.5rem; padding: 1rem;
      border-radius: 8px; display: none;
    }
    #result.success { background: #f0fff4; border: 1px solid #9ae6b4; }
    #result.error   { background: #fff5f5; border: 1px solid #feb2b2; }
    #result h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #2d3748; }
    #result p  { font-size: 0.9rem; color: #4a5568; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧑 Olivetti Face Classifier</h1>
    <p class="subtitle">Upload a 64×64 grayscale face image to identify the person.</p>

    <label class="upload-area" for="imageInput">
      <span>📂 Choose an image</span>
      <small>PNG, JPG or BMP — 64×64 recommended</small>
      <input type="file" id="imageInput" accept="image/*" />
    </label>

    <div id="preview">
      <img id="previewImg" src="#" alt="Preview" />
    </div>

    <button id="predictBtn" disabled>Predict</button>

    <div id="result">
      <h2 id="resultTitle"></h2>
      <p id="resultBody"></p>
    </div>
  </div>

  <script>
    const input      = document.getElementById('imageInput');
    const preview    = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const btn        = document.getElementById('predictBtn');
    const result     = document.getElementById('result');
    const resTitle   = document.getElementById('resultTitle');
    const resBody    = document.getElementById('resultBody');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      previewImg.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      btn.disabled = false;
      result.style.display = 'none';
    });

    btn.addEventListener('click', async () => {
      const file = input.files[0];
      if (!file) return;

      btn.disabled = true;
      btn.textContent = 'Predicting…';

      const form = new FormData();
      form.append('image', file);

      try {
        const resp = await fetch('/predict', { method: 'POST', body: form });
        const data = await resp.json();

        result.style.display = 'block';
        if (data.error) {
          result.className = 'error';
          resTitle.textContent = '⚠️ Error';
          resBody.textContent  = data.error;
        } else {
          result.className = 'success';
          resTitle.textContent = `✅ Prediction: ${data.label}`;
          resBody.textContent  = `Confidence: ${data.confidence}`;
        }
      } catch (e) {
        result.style.display = 'block';
        result.className = 'error';
        resTitle.textContent = '⚠️ Network Error';
        resBody.textContent  = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Predict';
      }
    });
  </script>
</body>
</html>
