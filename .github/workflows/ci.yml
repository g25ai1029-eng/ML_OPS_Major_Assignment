name: MLOps CI Pipeline

on:
  push:
    branches: ["**"]   # runs on every branch push

jobs:
  # ── Job 1: train & test the model ──────────────────────────────────────────
  check_working_repo:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Evaluate model
        run: python test.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: savedmodel
          path: savedmodel.pth
          retention-days: 7

  # ── Job 2: build & push Docker image (docker_cicd branch only) ─────────────
  build_and_push_docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: check_working_repo
    if: github.ref == 'refs/heads/docker_cicd'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: savedmodel

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/olivetti-face-classifier:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/olivetti-face-classifier:latest
